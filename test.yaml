trigger:
  - main   # jab bhi main branch pe push hoga, pipeline trigger hogi

pool:
  vmImage: 'ubuntu-latest'   # default Microsoft-hosted agent

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '18.x'
    displayName: 'Install Node.js'

  - script: |
      npm install
      npm run build
    displayName: 'Build app'

  - script: echo "✅ Pipeline completed successfully!"
    displayName: 'Final Step'
